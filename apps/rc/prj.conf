# USB CDC ACM - serial konzol
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_CDC_ACM=y
CONFIG_UART_LINE_CTRL=y
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

# Networking
CONFIG_NETWORKING=y
CONFIG_NET_L2_ETHERNET=y
CONFIG_NET_L2_ETHERNET_MGMT=y
# W6100 out-of-tree driver — modules/w6100_driver/ (backport Zephyr main
# upstream PR-ból v4.2.2 alá). Az overlay átírja a &ethernet node compatible
# mezőjét "wiznet,w6100"-ra, így a stock w5500 driver kikapcsolható.
CONFIG_ETH_W5500=n
CONFIG_ETH_W6100=y
CONFIG_NET_IPV4=y
CONFIG_NET_UDP=y
CONFIG_NET_LOG=y

# IP konfig — a tényleges beállítás config.json-ból jön (main.c)
CONFIG_NET_DHCPV4=y

# Hostname — set dynamically at runtime from node_name
CONFIG_NET_HOSTNAME_ENABLE=y
CONFIG_NET_HOSTNAME_DYNAMIC=y
CONFIG_NET_HOSTNAME="ROS_Bridge"
CONFIG_NET_HOSTNAME_MAX_LEN=63

# POSIX sockets (micro-ROS UDP transport)
CONFIG_POSIX_API=y
CONFIG_NET_SOCKETS=y

# Network buffers (RP2040: 264KB RAM)
CONFIG_NET_PKT_RX_COUNT=8
CONFIG_NET_PKT_TX_COUNT=8
CONFIG_NET_BUF_RX_COUNT=24
CONFIG_NET_BUF_TX_COUNT=24

# micro-ROS
# Az agent IP-t runtime config.json dönti el (devices/RC/config.json).
# Compile-time default = dev subnet (192.168.68.125), mert az RC prod
# subnet restore még nyitott (BL-013). BL-013 lezárásakor húzzuk 10.0.10.1-re.
CONFIG_MICROROS=y
CONFIG_MICROROS_TRANSPORT_UDP=y
CONFIG_MICROROS_AGENT_IP="192.168.68.125"
CONFIG_MICROROS_AGENT_PORT="8888"

# C++ és newlib (micro-ROS szükséges)
CONFIG_CPP=y
CONFIG_NEWLIB_LIBC=y
CONFIG_NEWLIB_LIBC_NANO=n

# Logging
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_PROCESS_THREAD_STACK_SIZE=2048

# Random number generator (networking igényli)
CONFIG_ENTROPY_GENERATOR=y
CONFIG_TEST_RANDOM_GENERATOR=y

# Heap / Stack (micro-ROS nagyobb igény)
CONFIG_HEAP_MEM_POOL_SIZE=98304
CONFIG_MAIN_STACK_SIZE=16384

# Flash + LittleFS (config tárolás)
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FILE_SYSTEM=y
CONFIG_FILE_SYSTEM_LITTLEFS=y
CONFIG_FS_LITTLEFS_FC_HEAP_SIZE=4096

# Shell (config parancsok soros konzolon)
CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_SERIAL=y
CONFIG_SHELL_STACK_SIZE=4096
CONFIG_SHELL_ARGC_MAX=8
CONFIG_SHELL_CMD_BUFF_SIZE=256
CONFIG_SHELL_BACKEND_SERIAL_RX_RING_BUFFER_SIZE=512
CONFIG_SHELL_BACKEND_SERIAL_TX_RING_BUFFER_SIZE=8192
CONFIG_SHELL_STACK_SIZE=8192
CONFIG_REBOOT=y

# Hardware watchdog (RP2040 beépített WDT)
CONFIG_WATCHDOG=y

# Hardware info (RP2040 unique device ID — used for MAC generation)
CONFIG_HWINFO=y

# --- micro-ROS entity limits ---
# Publishers: 16 csatorna + 1 diagnostics + spare = 20 (a param event publisher
#   elvetve BL-017 / ERR-032 miatt, de a slot marad spare-ként).
# Subscribers: 16 csatorna (legrosszabb eset).
# Servers: 2 user service (E-Stop, relay); a 6 param server slot törölve
#   (param_server_init() nincs a main.c-ben — config.json a forrás).
CONFIG_MICROROS_PUBLISHERS="20"
CONFIG_MICROROS_SUBSCRIBERS="16"
CONFIG_MICROROS_SERVERS="2"
CONFIG_MICROROS_CLIENTS="0"
CONFIG_MICROROS_NODES="1"

# --- GPIO interrupt (atomic flag ISR-hez) ---
# CONFIG_ATOMIC_OPERATIONS_BUILTIN nem user-configurable; RP2040-on automatikusan builtin

# --- ADC (akkumulátor feszültségmérés) ---
CONFIG_ADC=y

# --- BL-020 Step 2 fix — RP2040 PIO PWM input driver ---
# Eliminálja az IO_IRQ_BANK0 shared-IRQ dispatch latency-t, ami +27.5 µs
# szisztematikus bias-t okozott a CH2-n bármelyik másik HIGH csatorna
# ISR-je miatt. Részletek: docs/backlog.md BL-020.
CONFIG_PIO_RPI_PICO=y
CONFIG_RC_PWM_DRIVER_PIO=y
