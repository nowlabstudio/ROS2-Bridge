manifest:
  version: "0.13"

  remotes:
    - name: zephyrproject-rtos
      url-base: https://github.com/zephyrproject-rtos
    - name: micro-ros
      url-base: https://github.com/micro-ROS

  projects:
    - name: zephyr
      remote: zephyrproject-rtos
      # Pin: utolsó Zephyr release, ami egyszerre kompatibilis a Docker
      # image Zephyr SDK 0.17.4-gyével ÉS tartalmazza az `include/zephyr/
      # posix/time.h` header-t, amit a micro_ros_zephyr_module (jazzy HEAD
      # @ 87dbe3a) megkövetel. v4.3.0-ban a POSIX layout átrendezésével
      # ez a header eltűnt; v4.4.0 pedig SDK 1.0+-t követel.
      # Kompatibilitási mátrix: memory.md §0. ERRATA: ERR-025.
      revision: v4.2.2
      import: true

    - name: micro_ros_zephyr_module
      remote: micro-ros
      # Pin: a jazzy branch utolsó validált commitjára. Két lokális patch
      # is kell ezen a SHA-n (tools/patches/apply.sh); minden west update
      # után `make apply-patches` (automatikusan fut build előtt).
      # Dátum: 2025-12-15 (CI fix commit, kód-szinten megegyezik a
      # 2025-03-17 "updates project to work with zephyr v4.0.x" state-tel).
      revision: 87dbe3a9b9d0fa347772e971d58d123e2296281a
      path: modules/lib/micro_ros_zephyr_module

  self:
    path: app
