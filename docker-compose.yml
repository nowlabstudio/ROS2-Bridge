# =============================================================================
# docker-compose.yml — Robot stack (Agent + RoboClaw C++ driver + Foxglove)
# =============================================================================
#
# Usage:
#   make robot-start          # or: docker compose up -d
#   make robot-stop           # or: docker compose down
#   make robot-logs           # or: docker compose logs -f
#   make robot-shell          # or: docker compose exec ros2-shell bash
#
# Management UI:
#   Portainer: https://<robot-ip>:9443
#
# Prerequisites:
#   make host-build           # build host_ws (once, or after code changes)
#
# =============================================================================

services:

  # ── micro-ROS Agent (UDP) ──────────────────────────────────────────────────
  agent:
    image: microros/micro-ros-agent:jazzy
    container_name: w6100_bridge_agent_udp
    network_mode: host
    restart: unless-stopped
    command: udp4 -p ${AGENT_PORT:-8888} -v6

  # ── RoboClaw C++ ros2_control driver + rc_teleop ───────────────────────────
  roboclaw:
    image: ros:jazzy
    container_name: w6100_roboclaw
    network_mode: host
    restart: unless-stopped
    depends_on:
      agent:
        condition: service_started
    volumes:
      - ./host_ws:/host_ws:rw
      - ./tools/cyclonedds.xml:/tmp/cyclonedds.xml:ro
    environment:
      - ROS_DOMAIN_ID=0
      - FASTDDS_BUILTIN_TRANSPORTS=UDPv4
      - CYCLONEDDS_URI=file:///tmp/cyclonedds.xml
      - ROBOCLAW_HOST=${ROBOCLAW_HOST:-192.168.68.60}
      - ROBOCLAW_PORT=${ROBOCLAW_PORT:-8234}
    command: >
      bash -c "
        apt-get update -qq &&
        apt-get install -y -qq --no-install-recommends ros-jazzy-ros2-control ros-jazzy-ros2-controllers ros-jazzy-xacro ros-jazzy-robot-state-publisher >/dev/null 2>&1 &&
        source /opt/ros/jazzy/setup.bash &&
        source /host_ws/install/setup.bash &&
        ros2 launch roboclaw_hardware roboclaw.launch.py tcp_host:=$$ROBOCLAW_HOST tcp_port:=$$ROBOCLAW_PORT
      "

  # ── Foxglove Bridge (WebSocket :8765) ──────────────────────────────────────
  foxglove:
    build:
      context: ./docker
      dockerfile: Dockerfile.foxglove
    image: w6100-foxglove:latest
    container_name: w6100_foxglove_bridge
    network_mode: host
    restart: unless-stopped
    depends_on:
      agent:
        condition: service_started
    volumes:
      - ./tools/cyclonedds.xml:/tmp/cyclonedds.xml:ro
    environment:
      - ROS_DOMAIN_ID=0
      - FASTDDS_BUILTIN_TRANSPORTS=UDPv4
      - CYCLONEDDS_URI=file:///tmp/cyclonedds.xml
    command: >
      bash -c "source /opt/ros/jazzy/setup.bash &&
        ros2 launch foxglove_bridge foxglove_bridge_launch.xml port:=8765 address:=0.0.0.0"

  # ── ROS2 interactive shell ─────────────────────────────────────────────────
  ros2-shell:
    image: ros:jazzy
    container_name: w6100_bridge_ros2
    network_mode: host
    depends_on:
      agent:
        condition: service_started
    volumes:
      - ./host_ws:/host_ws:rw
      - ./tools/cyclonedds.xml:/tmp/cyclonedds.xml:ro
    environment:
      - ROS_DOMAIN_ID=0
      - FASTDDS_BUILTIN_TRANSPORTS=UDPv4
      - CYCLONEDDS_URI=file:///tmp/cyclonedds.xml
    stdin_open: true
    tty: true
    command: >
      bash -c "
        source /opt/ros/jazzy/setup.bash &&
        [ -f /host_ws/install/setup.bash ] && source /host_ws/install/setup.bash;
        exec bash
      "

  # ── Portainer CE — Docker management UI ───────────────────────────────────
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    profiles: ["management"]
    ports:
      - "9443:9443"
      - "8000:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - portainer_data:/data
    restart: unless-stopped

volumes:
  portainer_data:
